
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Dining and Travel Planner App</title>
      <meta name="description" content="This app helps users plan dining experiences and travel itineraries by tracking visits, sharing schedules, and analyzing spending, enhancing group outings." />
      <meta name="robots" content="noindex, nofollow" />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      
    </head>

    <body>
      
      <div id="root"></div>
      <div id="boot-error" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; padding:40px; background:#fff; color:#b91c1c; font:14px/1.6 monospace; white-space:pre-wrap; z-index:9999;"></div>
      <script>
        window.addEventListener('error', function(e) {
          var box = document.getElementById('boot-error');
          if (!box) return;
          box.style.display = 'block';
          box.textContent += 'ERROR: ' + e.message + '\n  at ' + (e.filename || '') + ':' + (e.lineno || '') + ':' + (e.colno || '') + '\n\n';
        });
        window.addEventListener('unhandledrejection', function(e) {
          var box = document.getElementById('boot-error');
          if (!box) return;
          box.style.display = 'block';
          box.textContent += 'PROMISE REJECTION: ' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)) + '\n\n';
        });
      </script>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
