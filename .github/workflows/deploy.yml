name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Windows 生成的 package-lock.json 会把可选原生二进制锁成 win32 版本，
      # 在 Linux CI 上触发 npm/cli#4828 漏装 @rollup/rollup-linux-x64-gnu，
      # 导致 Vite/vitest 启动即崩。CI 中删除锁文件改用 npm install 重新解析，
      # 让 npm 为 Linux runner 正确补齐平台原生二进制。
      - run: rm -f package-lock.json && npm install
      - run: npm test
      - run: npm run build
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
